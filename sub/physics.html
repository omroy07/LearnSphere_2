<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore Physics chapters on LearnSphere — Motion, NLM, Projectile, and Ray Optics.">
    <title>Physics – LearnSphere</title>
    <link rel="stylesheet" href="../variables.css">
    <script src="../theme.js"></script>
    <link rel="stylesheet" href="physics.css">
    <style>
        body {
            background: linear-gradient(135deg, #0d0d0d, #1a1a2e);
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 40px 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px cyan;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 0 10px;
        }

        .button {
            background: #007bff;
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            transition: background 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: block;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.4s ease;
        }

        .button:hover::before {
            left: 100%;
        }

        .button:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            p  { font-size: 1rem; }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚛️ Physics</h1>
        <p>Welcome to the Physics section. Select a chapter to begin.</p>

        <div class="button-container">
            <a href="../motion/motion.html" class="button">🏃 Motion</a>
            <a href="../nlm/nlm.html" class="button">⚖️ Newton's Laws of Motion</a>
            <a href="../projectile/projectile.html" class="button">🚀 Projectile Motion</a>
            <a href="../ray/ray.html" class="button">🔆 Ray Optics</a>
            <a href="../home.html" class="button">🏠 Back to Home</a>
        </div>
    </div>
    <!-- No inline script referencing non-existent DOM elements -->
</body>

</html>
