<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Your LearnSphere Dashboard — choose a subject, track your progress, and chat with the AI tutor.">
    <title>Dashboard – LearnSphere</title>
    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="home.css">
    <style>
        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Poppins', 'Inter', 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            transition: var(--theme-transition);
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .title { font-size: 2.5rem; text-shadow: var(--hero-title-shadow); }
        .description { font-size: 1.2rem; margin-bottom: 20px; color: var(--text-muted); }

        .button-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .button {
            background: var(--btn-primary-bg);
            color: white;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--theme-transition);
            box-shadow: var(--card-shadow);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .button:hover { background: var(--btn-primary-hover); transform: scale(1.05); }

        @media (max-width: 600px) {
            .title { font-size: 2rem; }
            .description { font-size: 1rem; }
        }

        /* ── Progress Tracker ─────────────────────────────────────────────── */
        .progress-overview {
            background: var(--tracker-bg);
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            box-shadow: var(--card-shadow);
            transition: var(--theme-transition);
        }

        .progress-overview h2 { color: var(--accent-color); margin-bottom: 10px; }

        /* Completion bar */
        .progress-bar-track {
            background: var(--border-color);
            border-radius: 50px;
            height: 12px;
            overflow: hidden;
            margin-bottom: 8px;
            transition: var(--theme-transition);
        }

        #progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--progress-bar-fill);
            border-radius: 50px;
            transition: width 0.5s ease;
        }

        #progress-summary {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        /* Progress item list */
        #progressList {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: left;
        }

        #progressList li.progress-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--progress-item-bg);
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 6px;
            border-left: 4px solid var(--border-color);
            transition: var(--theme-transition);
            color: var(--text-color);
        }

        #progressList li.progress-completed  { border-color: var(--completed-color); }
        #progressList li.progress-in-progress { border-color: var(--in-progress-color); }
        #progressList li.progress-not-started { border-color: var(--not-started-color); }

        .progress-label { font-size: 0.95rem; flex: 1; }

        .progress-badge {
            background: none;
            border: 1px solid currentColor;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.78rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .progress-badge:hover  { background: rgba(255,255,255,0.1); }
        .progress-badge:active { transform: scale(0.95); }

        .progress-badge:focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }
    </style>
    <script src="theme.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f1115">
</head>
<body>

    <div class="dashboard-container">
        <h1 class="title">Welcome to LearnSphere</h1>
        <p class="description">Choose a subject to start learning:</p>

        <div class="button-container" role="navigation" aria-label="Subject navigation">
            <a href="sub/maths.html" class="button">📐 Maths</a>
            <a href="sub/physics.html" class="button">⚛️ Physics</a>
            <a href="sub/chemistry.html" class="button">🧪 Chemistry</a>
            <a href="sub/biology.html" class="button">🧬 Biology</a>
        </div>

        <!-- Study Progress Section -->
        <section class="progress-overview" aria-labelledby="progress-heading">
            <h2 id="progress-heading">📊 Your Study Progress</h2>

            <!-- Overall completion bar -->
            <div
                class="progress-bar-track"
                role="progressbar"
                aria-label="Overall study completion"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
            >
                <div id="progress-bar-fill"></div>
            </div>
            <p id="progress-summary" aria-live="polite"></p>

            <!-- Per-topic list — populated by progress.js -->
            <ul id="progressList" aria-label="Topic progress list">
                <!-- Dynamic content rendered by progress.js -->
            </ul>
        </section>

        <!-- Chatbot Section -->
        <section class="chatbot" aria-labelledby="chatbot-heading">
            <h2 id="chatbot-heading">🤖 Ask Your AI Tutor</h2>
            <div class="chat-container">
                <div
                    id="chat-box"
                    role="log"
                    aria-live="polite"
                    aria-label="Chat conversation"
                    aria-relevant="additions"
                ></div>
                <div class="chat-input-row">
                    <input
                        type="text"
                        id="user-input"
                        placeholder="Ask me anything..."
                        aria-label="Chat message input"
                        autocomplete="off"
                    >
                    <button
                        onclick="sendMessage()"
                        aria-label="Send message"
                        id="sendBtn"
                    >Send</button>
                </div>
            </div>
        </section>

        <div class="footer-actions" style="margin-top: 30px; display: flex; justify-content: center; gap: 15px; align-items: center;">
            <button id="themeToggleBtn" class="theme-btn" aria-label="Toggle theme" style="background: var(--btn-secondary-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: var(--theme-transition);"></button>
            <button
                id="logoutButton"
                class="logout-button"
                aria-label="Log out of LearnSphere"
            >Logout</button>
        </div>
    </div>

    <script src="progress.js"></script>
    <script src="home.js"></script>

    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('LearnSphere: Service Worker registration failed:', err);
          });
        });
      })();
    </script>
</body>
</html>
