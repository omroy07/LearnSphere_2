<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your LearnSphere account to access courses, track your progress, and use the AI tutor.">
    <title>Login – LearnSphere</title>
    <link rel="stylesheet" href="../variables.css">
    <script src="../theme.js"></script>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <main role="main">
        <div class="auth-container" role="region" aria-labelledby="login-heading">
            <h2 id="login-heading">Login to LearnSphere</h2>

            <!-- Inline error/success messages injected by login.js -->
            <div id="auth-message" role="alert" aria-live="assertive" aria-atomic="true"></div>

            <form
                id="loginForm"
                novalidate
                aria-describedby="login-heading"
            >
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                        autocomplete="email"
                        aria-required="true"
                        aria-describedby="email-hint"
                    >
                    <span id="email-hint" class="sr-only">Enter the email address you registered with.</span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                            autocomplete="current-password"
                            aria-required="true"
                        >
                        <button
                            type="button"
                            class="toggle-password"
                            id="togglePassword"
                            aria-label="Show password"
                            aria-pressed="false"
                        >👁</button>
                    </div>
                </div>

                <button type="submit" class="auth-button" id="loginSubmitBtn">
                    Log In
                </button>

                <p class="switch-auth">
                    Don't have an account?
                    <a href="register.html" aria-label="Create a new LearnSphere account">Sign up</a>
                </p>
            </form>
        </div>
    </main>

    <script src="login.js"></script>
    <script>
        // Password visibility toggle
        const toggleBtn = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");

        toggleBtn.addEventListener("click", () => {
            const isVisible = passwordInput.type === "text";
            passwordInput.type = isVisible ? "password" : "text";
            toggleBtn.setAttribute("aria-pressed", (!isVisible).toString());
            toggleBtn.setAttribute("aria-label", isVisible ? "Show password" : "Hide password");
        });
    </script>
</body>
</html>
