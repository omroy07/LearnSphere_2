<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LearnSphere – An AI-powered educational platform providing world-class education to everyone, anywhere.">

    <!-- SEO / Social metadata -->
    <title>LearnSphere - Quality Education</title>
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://learnsphere.com/">

    <meta property="og:title" content="LearnSphere - Quality Education">
    <meta property="og:description" content="An AI-powered educational platform providing world-class education to everyone, anywhere.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://learnsphere.com/">
    <meta property="og:image" content="https://learnsphere.com/student.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LearnSphere - Quality Education">
    <meta name="twitter:description" content="An AI-powered educational platform providing world-class education to everyone, anywhere.">
    <meta name="twitter:image" content="https://learnsphere.com/student.png">

    <link rel="stylesheet" href="variables.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="theme.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/student.png">
    <meta name="theme-color" content="#0f1115">

    <!-- Performance: Hero image priority for above-the-fold content -->
    <link rel="preload" as="image" href="student.png">
</head>

<body>

        <header class="navbar" role="banner">
        <div class="logo"><a href="index.html" aria-label="LearnSphere Home">LearnSphere</a></div>

        <!-- Hamburger button — visible only on mobile -->
        <button
            class="hamburger"
            id="hamburgerBtn"
            aria-label="Toggle navigation menu"
            aria-expanded="false"
            aria-controls="navMenu"
        >
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav id="navMenu" role="navigation" aria-label="Main navigation">
            <ul>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="resources.html">Resources</a></li>
                <li><a href="community.html">Community</a></li>
            </ul>
        </nav>

        <button id="themeToggleBtn" class="theme-btn" aria-label="Toggle theme"></button>

        <div class="buttons">
            <button class="login"><a href="log/login.html">Log in</a></button>
            <button class="signup"><a href="log/register.html">Sign up</a></button>
        </div>
    </header>

    <main>
        <section class="hero" aria-label="Welcome section">
            <div class="hero-content">
                <h1>For every student, every classroom.</h1>
                <h2>Real results.</h2>
                <p>We aim to provide a world-class education to everyone, anywhere.</p>
                <div class="cta-buttons" role="group" aria-label="User type selection">
                    <button class="cta"><a href="learner.html">Learners</a></button>
                    <button class="cta"><a href="teachers.html">Teachers</a></button>
                    <button class="cta"><a href="parents.html">Parents</a></button>
                </div>
            </div>
            <div class="hero-image">
                <img
                    src="student.png"
                    alt="Happy student studying on LearnSphere"
                    loading="eager"
                    fetchpriority="high"
                    decoding="async"
                    width="400"
                    height="400"
                >
            </div>
        </section>
    </main>

    <script src="navbar.js" defer></script>
    <script src="script.js" defer></script>

    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('LearnSphere: Service Worker registration failed:', err);
          });
        });
      })();
    </script>

</body>

</html>
